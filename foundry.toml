[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
gas_limit = 150_000_000

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@automata-network/dcap-attestation/=lib/automata-dcap-v3-attestation/contracts/",
    "nitro-validator/=lib/nitro-validator/src/",
    "@solarity/libs/=lib/nitro-validator/lib/solidity-lib/contracts/libs/",
]
